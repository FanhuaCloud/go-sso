<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSO Login</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f7fb;color:#172033}
    main{width:min(560px,calc(100vw - 32px))}
    form{width:100%;background:white;border:1px solid #dce3ee;border-radius:8px;padding:24px;box-sizing:border-box}
    label{display:block;font-weight:650;margin:0 0 8px}
    input,select{width:100%;box-sizing:border-box;border:1px solid #b9c5d6;border-radius:6px;padding:12px;font-size:16px;background:white;color:#172033}
    button{width:100%;margin-top:16px;border:0;border-radius:6px;padding:12px 16px;font-size:16px;font-weight:700;background:#185abc;color:white;cursor:pointer}
    .hint{color:#556273;font-size:14px;margin:8px 0 0}
    .error{background:#fff1f0;border:1px solid #ffccc7;color:#a8071a;border-radius:6px;padding:10px;margin-bottom:14px}
    .email-row{display:grid;grid-template-columns:minmax(0,1fr) minmax(168px,auto) auto;gap:8px;align-items:center}
    .email-row input,.email-row select{min-width:0}
    .auth-code-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center}
    .auth-code-row input{min-width:0}
    .tool-button{width:44px;height:44px;margin:0;border:1px solid #b9c5d6;background:#f8fafc;color:#172033;border-radius:6px;padding:0;font-size:18px;line-height:1}
    .save-button{width:auto;height:44px;margin:0;border:1px solid #b9c5d6;background:#f8fafc;color:#172033;border-radius:6px;padding:0 14px;font-size:14px;font-weight:650;white-space:nowrap}
    .version{margin:16px 0 0;color:#6b7788;font-size:13px;text-align:center}
  </style>
</head>
<body>
  <main>
    <form id="login_form" method="post" action="/login">
      <h1>ChatGPT SSO</h1>
      {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
      <input type="hidden" name="request" value="{{.RequestID}}">
      <input type="hidden" id="email" name="email" value="">
      <label for="email_local">邮箱地址</label>
      <div class="email-row">
        <input id="email_local" name="email_local" type="text" autocomplete="username" placeholder="name" required autofocus>
        <select id="email_suffix" name="email_suffix" aria-label="邮箱后缀">
          {{range .EmailSuffixes}}<option value="{{.}}">{{.}}</option>{{end}}
        </select>
        <button class="tool-button" type="button" id="generate_email" title="随机生成邮箱前缀" aria-label="随机生成邮箱前缀">↻</button>
      </div>
      <p class="hint">仅允许 {{.EmailSuffixText}} 后缀。</p>
      <label for="auth_code">授权码</label>
      <div class="auth-code-row">
        <input id="auth_code" name="auth_code" type="password" autocomplete="one-time-code" required>
        <button class="save-button" type="button" id="save_auth_code">保存</button>
      </div>
      <button type="submit">登录</button>
    </form>
    <p class="version">go-sso {{.Version}}</p>
  </main>
  <script>
    const firstNames = [
      "james","john","robert","michael","william","david","richard","joseph",
      "thomas","charles","mary","patricia","jennifer","linda","elizabeth",
      "barbara","susan","jessica","sarah","karen"
    ];
    const lastNames = [
      "smith","johnson","williams","brown","jones","garcia","miller","davis",
      "rodriguez","martinez","hernandez","lopez","gonzalez","wilson","anderson",
      "thomas","taylor","moore","jackson","martin"
    ];
    const form = document.getElementById("login_form");
    const email = document.getElementById("email");
    const emailLocal = document.getElementById("email_local");
    const emailSuffix = document.getElementById("email_suffix");
    const authCode = document.getElementById("auth_code");
    const saveAuthCode = document.getElementById("save_auth_code");
    const authCodeStorageKey = "go_sso_auth_code";

    function randomItem(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomDigits(size) {
      const bytes = new Uint8Array(size);
      crypto.getRandomValues(bytes);
      return Array.from(bytes, (value) => String(value % 10)).join("");
    }

    function uniqueNumber() {
      const mixed = BigInt(Date.now()) * 1000000n + BigInt(Math.floor(Math.random() * 1000000));
      const digits = (mixed.toString() + randomDigits(12)).split("");
      for (let i = digits.length - 1; i > 0; i--) {
        const j = crypto.getRandomValues(new Uint8Array(1))[0] % (i + 1);
        [digits[i], digits[j]] = [digits[j], digits[i]];
      }
      return digits.join("").slice(0, 8);
    }

    document.getElementById("generate_email").addEventListener("click", () => {
      emailLocal.value = `${randomItem(firstNames)}${randomItem(lastNames)}${uniqueNumber()}`;
      authCode.focus();
    });

    try {
      const savedAuthCode = localStorage.getItem(authCodeStorageKey);
      if (savedAuthCode) {
        authCode.value = savedAuthCode;
      }
    } catch (err) {
    }

    saveAuthCode.addEventListener("click", () => {
      try {
        localStorage.setItem(authCodeStorageKey, authCode.value);
        saveAuthCode.textContent = "已保存";
        setTimeout(() => {
          saveAuthCode.textContent = "保存";
        }, 1200);
      } catch (err) {
        saveAuthCode.textContent = "保存失败";
        setTimeout(() => {
          saveAuthCode.textContent = "保存";
        }, 1200);
      }
    });

    form.addEventListener("submit", () => {
      email.value = `${emailLocal.value.trim()}${emailSuffix.value}`;
    });
  </script>
</body>
</html>
